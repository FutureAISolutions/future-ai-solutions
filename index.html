<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Track | Real-Time Financial Dashboard</title>
    <style>
        /* Professional Theme Configuration */
/* 1. Basic Reset & Background */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

}

body {
    background-color: #121212; /* Deep Professional Dark */
    color: white;
    display: flex; /* Sidebar aur Main Content ko side-by-side rakhne ke liye */
    min-height: 100vh;
}


/* 2. Sidebar Style (Agar aapne banaya hai) */
.sidebar {
    width: 250px;
    background-color: #1a1a1a;
    border-right: 1px solid #333;
    padding: 20px;
}

/* 3. Main Content Area */
.main-content {
    flex-grow: 1; 
    display: flex;
    flex-direction: column;
    
    /* Ye do lines sabse important hain center karne ke liye */
    align-items: center;      /* Horizontal Center (Left-Right ke beech) */
    justify-content: center;   /* Vertical Center (Upar-Niche ke beech) */
    
    min-height: 100vh;
    padding: 40px;
    width: calc(100% - 250px); /* Sidebar ki jagah chhod kar bachi hui poori width */
}

.header-section {
    text-align: center;
    margin-bottom: 40px;
    width: 100%;
}



.header-section p {
    color: #848e9c;
    font-size: 1.1rem;
}

/* 4. THE GRID - Boxes ko Fela-Fela kar dikhane ke liye */
.price-grid {
    display: grid;
    /* Isse 3 columns banenge jo screen ke hisaab se adjust honge */
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
    gap: 30px; 
    width: 100%;
    max-width: 1200px; /* Isse boxes ek limit mein rahenge aur screen ke beech mein dikhenge */
    margin: 0 auto;    /* Extra safety for centering */
}

/* 5. BOX DESIGN (Rounded & Professional) */
.card {
    background: #1e222d; /* Bluish-Black Trading Look */
    border: 1px solid #2d3343;
    border-radius: 20px; /* Rounded corners jo aapko pasand hain */
    padding: 35px;
    transition: all 0.4s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
}

/* Hover Effect */
.card:hover {
    transform: translateY(-10px); /* Box thoda upar uthega */
    border-color: #39FF14; /* Neon Green Border */
    box-shadow: 0 15px 30px rgba(57, 255, 20, 0.15); /* Soft Glow */
}

/* Card Text Styling */
.card p {
    color: #848e9c;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 15px;
}

.card h2 {
    color: #39FF14; /* Neon Green Price */
    font-size: 2.2rem;
    font-weight: bold;
    margin: 0;
    text-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
}
/* Sidebar se dots/bullets hatane ke liye */
.sidebar ul {
    list-style-type: none; /* Dots gayab ho jayenge */
    padding: 0;
}

.sidebar li {
    padding: 12px 15px;
    margin-bottom: 5px;
    color: #848e9c;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

.sidebar li:hover {
    background-color: #2d3343;
    color: #39FF14;
}

/* Price Cards ka spacing fix */


/* Button ko sundar banane ke liye */
#refresh-btn {
    background: #39FF14;
    color: black;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

#refresh-btn:hover {
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
    transform: scale(1.05);
}


/* Responsive Setting */
@media (max-width: 768px) {
    .price-grid {
        grid-template-columns: 1fr; /* Mobile par ek ke niche ek */
    }
}
    </style>
 
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo">AlphaTrack</div>
            <ul>
                <li class="active">Market Overview</li>
                <li>Crypto Assets</li>
                <li>Stock Watchlist</li>
                <li>Settings</li>
            </ul>
        </nav>
        <nav class="sidebar">
    <div class="sidebar-header">
        <img src="https://img.midjourney.com/c6e3b567-9d7a-4b9e-bd41-119d65a3977c/0_1.webp" alt="AlphaTrack Logo" class="trader-logo">
        <h1 id="heading">AlphaTrack Dashboard</h1>
    </div>
    
    <div class="logo">AlphaTrack</div>
    <ul>
        <li class="active">Market Overview</li>
        </ul>
</nav>

    
    
    
<main class="main-content">
    <div class="header-section">
        <h1>Market Insights</h1>
        <p>Live Data Monitoring</p>
    </div>

    <div class="price-grid">
        <div class="price-item card">
            <p>Ethereum (ETH)</p>
            <h2 id="eth-price">Fetching...</h2>
        </div>
        <div class="price-item card">
            <p>Bitcoin (BTC)</p>
            <h2 id="btc-price">Fetching...</h2>
        </div>
        <div class="price-item card">
            <p>Market Sentiment</p>
            <h2>Neutral</h2>
        </div>
    </div>

    <div class="interaction-section">
        <button id="refresh-btn">Force Update Data</button>
    </div>
</main>
            </section>

        </main>
    </div>
    <script>
    async function getPrices() {
        console.log("Koshish kar raha hoon data laane ki...");
        try {
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
            const data = await response.json();

            // Element check aur update
            const btcElement = document.getElementById('btc-price');
            const ethElement = document.getElementById('eth-price');

            if (btcElement && ethElement) {
                btcElement.innerText = `$${data.bitcoin.usd.toLocaleString()}`;
                ethElement.innerText = `$${data.ethereum.usd.toLocaleString()}`;
                console.log("Data aa gaya!");
            } else {
                console.log("Error: HTML mein 'btc-price' ya 'eth-price' ID nahi mili!");
            }
        } catch (error) {
            console.error("Network problem ya API error:", error);
        }
    }

    // Pehli baar chalane ke liye
    getPrices();
    
    // Har 30 seconds mein update
    setInterval(getPrices, 30000);
</script>
    </script>
    
</body>
</html>
